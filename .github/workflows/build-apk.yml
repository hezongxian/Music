name: Build APKon:  push:    branches: [master]  workflow_dispatch:jobs:  build:    runs-on: ubuntu-latest    steps:      - uses: actions/checkout@v4      - uses: pnpm/action-setup@v4        with:          version: 9      - uses: actions/setup-node@v4        with:          node-version: 20          cache: pnpm      - name: Setup Java 17        uses: actions/setup-java@v4        with:          distribution: temurin          java-version: 17      - name: Setup Android SDK        run: |          $ANDROID_SDK_ROOT=/usr/local/lib/android/sdk          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" "ndk;26.1.10909125" > /dev/null 2>&1 || true        shell: bash      - name: Install dependencies        run: pnpm install --frozen-lockfile      - name: Build APK        working-directory: android        run: |          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties          echo "RELEASE_STORE_FILE=../app/banban.keystore" > keystore.properties          echo "RELEASE_STORE_PASSWORD=banban123" >> keystore.properties          echo "RELEASE_KEY_ALIAS=banban" >> keystore.properties          echo "RELEASE_KEY_PASSWORD=banban123" >> keystore.properties          echo "org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m" >> gradle.properties          chmod +x gradlew          ./gradlew assembleRelease --no-daemon --stacktrace        shell: bash      - name: Upload APK        if: always()        uses: actions/upload-artifact@v4        with:          name: banban-music-apk          path: android/app/build/outputs/apk/release/app-release.apk          retention-days: 30