name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-34 build-tools;34.0.0 ndk;26.1.10909125"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create keystore properties
        working-directory: android
        run: |
          echo "RELEASE_STORE_FILE=../app/banban.keystore" > keystore.properties
          echo "RELEASE_STORE_PASSWORD=banban123" >> keystore.properties
          echo "RELEASE_KEY_ALIAS=banban" >> keystore.properties
          echo "RELEASE_KEY_PASSWORD=banban123" >> keystore.properties

      - name: Build APK
        working-directory: android
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> local.properties
          echo "org.gradle.jvmargs=-Xmx4096m" >> gradle.properties
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: banban-music-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
